<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge HUD</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            background: rgba(0, 0, 0, 0.95);
            color: #00ff00;
            border-radius: 10px;
            backdrop-filter: blur(10px);
            border: 1px solid #00ff00;
        }

        .hud-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .search-container {
            margin-bottom: 20px;
        }

        #search-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #00ff00;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff00;
            font-size: 16px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            outline: none;
        }

        #search-input::placeholder {
            color: rgba(0, 255, 0, 0.6);
        }

        #search-input:focus {
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            border-color: #00aa00;
        }

        .results-container {
            max-height: 400px;
            overflow-y: auto;
        }

        .entry {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #00aa00;
            box-shadow: 0 0 5px rgba(0, 255, 0, 0.2);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .entry-title {
            font-weight: bold;
            font-size: 16px;
        }

        .entry-meta {
            font-size: 12px;
            color: rgba(0, 255, 0, 0.7);
        }

        .entry-content {
            line-height: 1.6;
            color: #00ff00;
        }

        .entry-content h1,
        .entry-content h2,
        .entry-content h3 {
            margin-top: 15px;
            margin-bottom: 8px;
            color: #00ff00;
        }

        .entry-content code {
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            color: #00aa00;
        }

        .entry-content pre {
            background: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            overflow-x: auto;
            border: 1px solid #00aa00;
        }

        .entry-content pre code {
            background: none;
            padding: 0;
            color: #00ff00;
        }

        .entry-tags {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(0, 255, 0, 0.7);
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: rgba(0, 255, 0, 0.6);
        }

        .close-hint {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 12px;
            color: rgba(0, 255, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="close-hint">Click outside or press Esc to close</div>
    <div class="hud-container">
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search your knowledge base..." autocomplete="off">
        </div>
        <div class="results-container" id="results-container">
            <div class="no-results">Start typing to search your knowledge...</div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const searchInput = document.getElementById('search-input');
        const resultsContainer = document.getElementById('results-container');

        let allEntries = [];

        // Load all entries on startup
        async function loadEntries() {
            try {
                allEntries = await ipcRenderer.invoke('get-library');
                displayResults(allEntries.slice(0, 10)); // Show first 10
            } catch (error) {
                console.error('Error loading entries:', error);
            }
        }

        // Search functionality
        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value.trim();
            if (query.length === 0) {
                displayResults(allEntries.slice(0, 10));
                return;
            }

            try {
                const results = await ipcRenderer.invoke('search-library', query);
                displayResults(results);
            } catch (error) {
                console.error('Search error:', error);
            }
        });

        // Display results
        function displayResults(entries) {
            if (entries.length === 0) {
                resultsContainer.innerHTML = '<div class="no-results">No matching entries found</div>';
                return;
            }

            resultsContainer.innerHTML = entries.map(entry => `
                <div class="entry">
                    <div class="entry-header">
                        <div class="entry-title">${entry.title}</div>
                        <div class="entry-meta">${entry.type} • ${new Date(entry.created).toLocaleDateString()}</div>
                    </div>
                    <div class="entry-content">
                        ${entry.type === 'code' ? `<pre><code class="language-text">${entry.content}</code></pre>` : `<div class="markdown-content">${marked.parse(entry.content)}</div>`}
                    </div>
                    ${entry.tags && entry.tags.length > 0 ? `<div class="entry-tags">Tags: ${entry.tags.join(', ')}</div>` : ''}
                </div>
            `).join('');

            // Highlight code blocks
            setTimeout(() => Prism.highlightAll(), 0);
        }

        // Handle escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                ipcRenderer.send('hide-hud');
            }
        });

        // Load entries when ready
        loadEntries();
    </script>
</body>
</html>
